---
layout: default
title: My Blog  
---
<h1>{{ page.title }}</h1>
<body>
  <img src="images/blogger-meme-1.jpg" alt="Blog Meme">
</body>
<ul class="posts">
  {% for post in site.posts %}
  <li><span>{{ post.date | date_to_string }}</span> » <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a></li>
  {% endfor %}
</ul>
